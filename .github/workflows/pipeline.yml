name: Policy Pipeline

on:
  schedule:
    - cron: '*/30 * * * *'  # 30분마다 실행
  workflow_dispatch:
    inputs:
      batch:
        description: 'morning or evening'
        default: 'morning'

permissions:
  contents: write

concurrency:
  group: policy-pipeline
  cancel-in-progress: false

jobs:
  crawl-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Determine batch
        id: batch
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "batch=${{ github.event.inputs.batch }}" >> $GITHUB_OUTPUT
          else
            HOUR_UTC=$(date -u +%H)
            if [ "$HOUR_UTC" -lt "9" ]; then
              echo "batch=morning" >> $GITHUB_OUTPUT
            else
              echo "batch=evening" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run pipeline
        run: python -m pipeline.main
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
          BATCH: ${{ steps.batch.outputs.batch }}

      - name: Commit and push updated data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/ pipeline/seen_policies.json pipeline/pending_notify.json
          git diff --staged --quiet || git commit -m "chore: update policy data [skip ci]"
          git push

      # 상세 JSON이 CDN(GitHub Pages)에 반영된 것을 확인한 뒤에 알림을 보낸다.
      # 그래야 사용자가 푸시를 탭했을 때 정책 상세가 정상적으로 로드된다.
      - name: Send notifications (after CDN is live)
        run: python -m pipeline.main notify
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
