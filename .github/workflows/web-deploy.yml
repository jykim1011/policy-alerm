name: Deploy Web

# 웹 정적 사이트(web/)를 빌드해 Firebase Hosting 에 배포한다.
# 트리거:
#  1) web/ 또는 firebase.json 변경 push — 코드/설정 변경 시
#  2) Policy Pipeline 완료 후(workflow_run) — 데이터 갱신 시
#     (Policy Pipeline 의 데이터 커밋은 "[skip ci]" 라 push 트리거가 안 걸리므로 필요)
on:
  push:
    branches: [master]
    paths:
      - "web/**"
      - "firebase.json"
      - ".github/workflows/web-deploy.yml"
  workflow_run:
    workflows: ["Policy Pipeline"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: web-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: policy-alerm.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: policy-alerm
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: policy-alerm.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "249888568978"
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://policy-alerm.web.app' }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        # 파이프라인과 동일한 FIREBASE_SERVICE_ACCOUNT 시크릿을 재사용한다(새 키 불필요).
        # 단, 이 SA(firebase-adminsdk-fbsvc@…)에 roles/firebasehosting.admin 권한이 있어야 한다.
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx --yes firebase-tools@latest deploy --only hosting --project policy-alerm --non-interactive
