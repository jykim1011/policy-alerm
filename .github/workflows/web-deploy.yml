name: Deploy Web

# 웹 정적 사이트(web/)를 빌드해 Firebase Hosting 에 배포한다.
#
# 자동 트리거 활성화됨:
#  - push(web/·firebase.json 변경): 웹 코드/설정 수정 시 재배포
#  - workflow_run(Policy Pipeline 완료): 새 정책이 들어오면 정적 페이지를 다시 구워
#    "새 정책이 웹에서 404" 공백을 없앤다. (데이터 push는 [skip ci]지만 workflow_run은
#    파이프라인 워크플로 완료에 걸리므로 [skip ci]의 영향을 받지 않는다.)
#  CI SA(firebase-adminsdk-fbsvc@…)에는 hosting 배포 권한이 확인되어 있다.
#  데이터 무변경 시 firebase가 "identical version" 400을 반환하는데, 이는 배포할
#  것이 없다는 뜻이므로 deploy 단계에서 성공으로 처리한다(거짓 실패 알림 방지).
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "web/**"
      - "firebase.json"
      - ".github/workflows/web-deploy.yml"
  workflow_run:
    workflows: ["Policy Pipeline"]
    types: [completed]

concurrency:
  group: web-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: policy-alerm.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: policy-alerm
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: policy-alerm.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "249888568978"
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://policy-alerm.web.app' }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        # 파이프라인과 동일한 FIREBASE_SERVICE_ACCOUNT 시크릿을 재사용한다(새 키 불필요).
        # 단, 이 SA(firebase-adminsdk-fbsvc@…)에 roles/firebasehosting.admin 권한이 있어야 한다.
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # FIREBASE_SERVICE_ACCOUNT 시크릿 JSON 앞에 UTF-8 BOM이 섞여 있어 그대로 쓰면
          # firebase-tools 인증이 "Failed to authenticate"로 깨진다. 첫 줄의 BOM을 제거한다.
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" | sed '1s/^\xEF\xBB\xBF//' > "$GOOGLE_APPLICATION_CREDENTIALS"
          # 빌드 결과가 라이브와 동일하면 firebase가 "current active version" 400으로 실패한다.
          # 이는 배포할 변경이 없다는 뜻이므로 거짓 실패로 취급하지 않는다.
          set -o pipefail
          out=$(npx --yes firebase-tools@latest deploy --only hosting --project policy-alerm --non-interactive 2>&1) && rc=0 || rc=$?
          echo "$out"
          if [ "$rc" -ne 0 ] && echo "$out" | grep -q "is the current active version"; then
            echo "::notice::배포할 변경 없음(라이브가 이미 최신). 성공으로 처리."
            exit 0
          fi
          exit "$rc"
