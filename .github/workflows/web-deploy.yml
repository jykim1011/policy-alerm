name: Deploy Web

# 웹 정적 사이트(web/)를 빌드해 Firebase Hosting 에 배포한다.
#
# ⚠️ 자동 트리거(push·workflow_run)는 비활성화되어 있다(수동 실행만).
#    CI 배포가 동작하려면 CI 서비스 계정(firebase-adminsdk-fbsvc@…)에
#    roles/firebasehosting.admin 권한이 필요하다(미부여 상태). 권한 부여 전까지
#    자동 실행하면 deploy 단계에서 매번 실패해 알림 메일이 쌓이므로 수동 실행만 둔다.
#    권한 부여 후 아래 push/workflow_run 트리거 주석을 해제하면 자동 배포가 켜진다.
on:
  workflow_dispatch:
  # push:
  #   branches: [master]
  #   paths:
  #     - "web/**"
  #     - "firebase.json"
  #     - ".github/workflows/web-deploy.yml"
  # workflow_run:
  #   workflows: ["Policy Pipeline"]
  #   types: [completed]

concurrency:
  group: web-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Build static site
        working-directory: web
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: policy-alerm.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: policy-alerm
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: policy-alerm.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "249888568978"
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://policy-alerm.web.app' }}
        run: npm run build

      - name: Deploy to Firebase Hosting
        # 파이프라인과 동일한 FIREBASE_SERVICE_ACCOUNT 시크릿을 재사용한다(새 키 불필요).
        # 단, 이 SA(firebase-adminsdk-fbsvc@…)에 roles/firebasehosting.admin 권한이 있어야 한다.
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # FIREBASE_SERVICE_ACCOUNT 시크릿 JSON 앞에 UTF-8 BOM이 섞여 있어 그대로 쓰면
          # firebase-tools 인증이 "Failed to authenticate"로 깨진다. 첫 줄의 BOM을 제거한다.
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" | sed '1s/^\xEF\xBB\xBF//' > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx --yes firebase-tools@latest deploy --only hosting --project policy-alerm --non-interactive
